ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false

    # 坐标系定义
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 不对外发布 tf 树 (为了简单起见，我们直接读它发布的话题)
    publish_tf: false

    # 1. 模拟 DVL 配置 (输入机体速度 Vx, Vy, Vz)
    twist0: /sensor/dvl
    twist0_config: [false, false, false, # x, y, z
                    false, false, false, # roll, pitch, yaw
                    true,  true,  true,  # vx, vy, vz (仅融合速度)
                    false, false, false, # vroll, vpitch, vyaw
                    false, false, false] # ax, ay, az
    twist0_differential: false

    # 2. 模拟深度计配置 (输入世界 Z)
    pose0: /sensor/depth
    pose0_config: [false, false, true,   # 仅融合 Z 轴位置
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_differential: false

    # 3. 模拟 IMU 配置 (输入姿态 角)
    imu0: /sensor/imu
    imu0_config: [false, false, false,
                  true,  true,  true,    # 融合姿态 (Roll, Pitch, Yaw)
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0_differential: false

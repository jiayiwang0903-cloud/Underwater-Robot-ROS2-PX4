ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false

    # 坐标系定义
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 不对外发布 tf 树
    publish_tf: false

    # x, y, z
    # roll, pitch, yaw
    # vx, vy, vz
    # vroll, vpitch, vyaw
    # ax, ay, az

    # 2. 实际深度计配置 (输入世界 Z)
    # 按需改成你的真实话题名
    pose0: /sensor/depth
    pose0_config: [false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_differential: false

    # 3. DVL 内置融合位姿 (输入位置 + Roll/Pitch/Yaw)
    # 由 dvl_bridge.py 将 /dvl/position 转为 /sensor/dvl_pose。
    pose1: /sensor/dvl_pose
    pose1_config: [true,  true,  true,
             true,  true,  true,
             true, true, true,
             true, true, true,
             false, false, false]
    pose1_differential: false

    # 4. 实际 IMU 配置 (姿态 + 角速度 + 线加速度)
    # 推荐由 bridge 节点把 PX4 IMU 转成 sensor_msgs/Imu 后发布到该话题。
    imu0: /sensor/imu_real
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true

    # 可选: 视觉/USBL 的绝对位置校准
    # pose2: /sensor/usbl_pose
    # pose2_config: [true,  true,  false,
    #                false, false, true,
    #                false, false, false,
    #                false, false, false,
    #                false, false, false]
    # pose2_differential: false
